version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wms_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - wms_net
    mem_limit: 768m
    cpus: "1.00"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  wms_net:
    external: true
