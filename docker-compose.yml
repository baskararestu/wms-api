version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wms_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: wms_db
      DB_PORT: ${DB_PORT_DOCKER:-5432}
      REDIS_HOST: ${REDIS_HOST_DOCKER:-host.docker.internal}
      REDIS_PORT: ${REDIS_PORT_DOCKER:-6379}
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - wms_net
    mem_limit: 768m
    cpus: "1.00"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  wms_net:
    driver: bridge
